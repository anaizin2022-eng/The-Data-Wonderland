<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數據魔法森林：恐龍的試煉</title>
  
  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Animations and Fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Serif+TC:wght@700;900&display=swap');
    
    body {
      font-family: 'Nunito', 'Microsoft JhengHei', sans-serif;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }
    
        .watercolor-bg {
          background-color: #f0fdfa;
          background-image: 
            radial-gradient(circle at 15% 50%, rgba(204, 251, 241, 0.8), transparent 50%),
            radial-gradient(circle at 85% 30%, rgba(224, 242, 254, 0.8), transparent 50%),
            radial-gradient(circle at 50% 80%, rgba(236, 253, 245, 0.8), transparent 50%),
            radial-gradient(circle at 80% 90%, rgba(254, 240, 138, 0.3), transparent 40%),
            radial-gradient(circle at 20% 10%, rgba(188, 254, 232, 0.4), transparent 40%);
          filter: contrast(1.1) brightness(1.05) saturate(1.1);
        }

        /* 滾動條美化 */
        .custom-scrollbar::-webkit-scrollbar {
          width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
          background: rgba(255, 255, 255, 0.2); 
          border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background: rgba(20, 184, 166, 0.5); 
          border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background: rgba(20, 184, 166, 0.8); 
        }
      </style>
    </head>
<body class="bg-gray-50 selection:bg-teal-300 selection:text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 3D 全息投影恐龍組件
    const HologramModel = ({ emoji, scale = 1, animate = false }) => (
      <div className={`relative flex flex-col items-center justify-center ${animate ? 'animate-float' : ''}`} style={{ transform: `scale(${scale})` }}>
        {/* Hologram Light */}
        <div className="absolute bottom-4 w-24 h-32 bg-gradient-to-t from-sky-400/50 to-transparent blur-xl rounded-full"></div>
        {/* Base Plate */}
        <div className="absolute -bottom-2 w-32 h-8 border-2 border-sky-300 bg-sky-200/30 rounded-[100%] shadow-[0_0_20px_rgba(56,189,248,0.6)]" style={{ transform: 'rotateX(60deg)' }}></div>
        <div className="absolute -bottom-2 w-28 h-6 border border-teal-300 bg-teal-200/50 rounded-[100%] animate-pulse" style={{ transform: 'rotateX(60deg)' }}></div>
        {/* The Model */}
        <div className="text-8xl relative z-10 drop-shadow-[0_10px_15px_rgba(0,0,0,0.3)]">{emoji}</div>
      </div>
    );

    function FantasyDataAdventure() {
      const [stage, setStage] = useState(0);
      const [gameScore, setGameScore] = useState(0);

      // === Stage 2: Z-Score Slider (Dino Weight) ===
      const [dinoWeight, setDinoWeight] = useState(50);
      const zScoreConcept = ((dinoWeight - 50) / 10).toFixed(1);

      // === Quiz States ===
      const [quizFeedback, setQuizFeedback] = useState("");

      const handleQuiz = (isCorrect, points) => {
        if (isCorrect) {
          setQuizFeedback("✨ 咒語正確！考點命中！ ✨");
          setGameScore(s => s + points);
          setTimeout(() => {
            setQuizFeedback("");
            setStage(s => s + 1);
          }, 1500);
        } else {
          setQuizFeedback("❌ 咒語失效...請再想一想魔法法則！");
          setTimeout(() => setQuizFeedback(""), 2000);
        }
      };

      // === Stage 5: Dino Minigame ===
      const [targetDino, setTargetDino] = useState({ weight: 50, z: 0 });
      const [dinoFeedback, setDinoFeedback] = useState("");
      const [dinoWins, setDinoWins] = useState(0); 

      const generateDino = () => {
        const u1 = Math.random();
        const u2 = Math.random();
        const z = Math.sqrt(-2.0 * Math.log(u1 || 0.1)) * Math.cos(2.0 * Math.PI * u2);
        const weight = Math.round(50 + (z * 10));
        setTargetDino({ weight, z: parseFloat(((weight - 50) / 10).toFixed(1)) });
        setDinoFeedback("");
      };

      const guessRarity = (expectedZone) => {
        const absZ = Math.abs(targetDino.z);
        let actualZone = "";
        if (absZ <= 1) actualZone = "common";
        else if (absZ <= 2) actualZone = "rare";
        else if (absZ <= 3) actualZone = "epic";
        else actualZone = "legendary";

        if (expectedZone === actualZone) {
          setGameScore(s => s + 10);
          setDinoWins(w => w + 1);
          setDinoFeedback("✨ 鑑定成功！ ✨");
          setTimeout(generateDino, 1000);
        } else {
          setDinoFeedback(`❌ 哎呀！牠是 ${actualZone.toUpperCase()} 等級！(Z = ${targetDino.z})`);
        }
      };

      // === Stage 13: Dino Egg Minigame (IQR) ===
      const [eggSet, setEggSet] = useState([12, 14, 15, 18, 45]);
      const [eggFeedback, setEggFeedback] = useState("");
      const [eggWins, setEggWins] = useState(0); 

      const generateEggs = () => {
        const normalEggs = Array.from({ length: 4 }, () => Math.floor(Math.random() * 10) + 10).sort((a, b) => a - b);
        const Q1_est = normalEggs[1];
        const Q3_est = normalEggs[3];
        const iqr_est = Q3_est - Q1_est;
        
        const outlier = Q3_est + Math.floor(1.5 * iqr_est) + 10 + Math.floor(Math.random() * 10);
        const newEggs = [...normalEggs, outlier];
        setEggSet(newEggs);
        setEggFeedback("");
      };

      const purifyEgg = (eggValue) => {
        const Q1 = eggSet[1]; 
        const Q3 = eggSet[3];
        const IQR = Q3 - Q1;
        const upperFence = Q3 + 1.5 * IQR;

        if (eggValue > upperFence) {
          setEggFeedback("💎 淨化成功！結界發動！ 💎");
          setGameScore(s => s + 20);
          setEggWins(w => w + 1);
          setTimeout(generateEggs, 1500);
        } else {
          setEggFeedback(`💥 點錯了！這顆恐龍蛋在安全結界 (${upperFence.toFixed(1)}) 內！`);
        }
      };

      // === Stage 14: Comparison Interactive State ===
      const [summonGiant, setSummonGiant] = useState(false);

      // === Stage 6: Standardization State ===
      const [isStandardized, setIsStandardized] = useState(false);

      useEffect(() => {
        if (stage === 5 && targetDino.weight === 50) generateDino();
        if (stage === 13 && eggSet[0] === 12) generateEggs();
      }, [stage]);

      const getCurveX = (z) => {
        const clampedZ = Math.max(-4, Math.min(4, z));
        return 50 + (clampedZ * 12.5);
      };

      // 動態水彩主題系統 (擴增到 18 種)
      const getTheme = (s) => {
        const themes = [
          { bg: '#f0fdf4', b1: '#a7f3d0', b2: '#bae6fd', b3: '#fbcfe8' }, // 0: Start
          { bg: '#faf5ff', b1: '#e9d5ff', b2: '#fbcfe8', b3: '#bae6fd' }, // 1: Formula Z
          { bg: '#fff1f2', b1: '#fecdd3', b2: '#c7d2fe', b3: '#99f6e4' }, // 2: Slider
          { bg: '#fffbeb', b1: '#fde68a', b2: '#fecdd3', b3: '#ffedd5' }, // 3: Q1
          { bg: '#f0fdf4', b1: '#6ee7b7', b2: '#7dd3fc', b3: '#a5b4fc' }, // 4: Rule
          { bg: '#f0f9ff', b1: '#7dd3fc', b2: '#67e8f9', b3: '#93c5fd' }, // 5: Minigame Z
          { bg: '#f0fdfa', b1: '#5eead4', b2: '#86efac', b3: '#a7f3d0' }, // 6: Standardize
          { bg: '#fff1f2', b1: '#fda4af', b2: '#fca5a5', b3: '#fef08a' }, // 7: Alert
          { bg: '#fff7ed', b1: '#fcd34d', b2: '#fca5a5', b3: '#fda4af' }, // 8: Q16
          { bg: '#eef2ff', b1: '#a5b4fc', b2: '#d8b4fe', b3: '#7dd3fc' }, // 9: Formula IQR
          { bg: '#fdf4ff', b1: '#d8b4fe', b2: '#f0abfc', b3: '#a5b4fc' }, // 10: Q48
          { bg: '#f0f9ff', b1: '#7dd3fc', b2: '#93c5fd', b3: '#5eead4' }, // 11: Skew
          { bg: '#fffbeb', b1: '#fcd34d', b2: '#fdba74', b3: '#fde047' }, // 12: Q25
          { bg: '#fdf4ff', b1: '#f0abfc', b2: '#fda4af', b3: '#fcd34d' }, // 13: Minigame IQR
          { bg: '#faf5ff', b1: '#d8b4fe', b2: '#5eead4', b3: '#fda4af' }, // 14: Compare
          { bg: '#fefce8', b1: '#fde047', b2: '#a7f3d0', b3: '#f9a8d4' }, // 15: CARTOON 1 (Use cases)
          { bg: '#e0e7ff', b1: '#c7d2fe', b2: '#fda4af', b3: '#a5b4fc' }, // 16: CARTOON 2 (Logic)
          { bg: '#fefce8', b1: '#fde047', b2: '#f9a8d4', b3: '#bae6fd' }, // 17: End
        ];
        return themes[s] || themes[0];
      };

      const currentTheme = getTheme(stage);

      // ======================================================================
      // Chapter Renders (0 to 17)
      // ======================================================================

      const renderStage0 = () => (
        <div className="flex flex-col items-center justify-center h-full text-center space-y-8 relative z-10 animate-fadeIn">
          <HologramModel emoji="🦕" animate={true} />
          <div>
            <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-600 via-teal-500 to-sky-500 mb-4 drop-shadow-md font-serif tracking-wide">
              數據魔法森林
            </h1>
            <p className="text-emerald-900 text-lg md:text-xl font-bold max-w-2xl mx-auto leading-relaxed bg-white/60 p-5 rounded-2xl shadow-sm border border-white/50 backdrop-blur-sm">
              長老：「見習妖精啊，遠古的『恐龍數據』正在森林中復甦。<br/>
              唯有掌握 <span className="text-teal-600">Z分數魔法</span> 與 <span className="text-sky-600">箱型結界</span>，方能馴服牠們。<br/>
              準備好接受這 16 個篇章的『iPAS 遠古卷軸』試煉了嗎？」
            </p>
          </div>
          <button onClick={() => setStage(1)} className="px-10 py-4 bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold text-xl rounded-full shadow-[0_10px_20px_rgba(20,184,166,0.3)] hover:scale-105 transition-all border border-white/30">
            🌟 啟動侏羅紀法陣 (第一章)
          </button>
        </div>
      );

      const renderStage1 = () => (
        <div className="flex flex-col h-full animate-fadeIn items-center justify-center relative z-10">
          <div className="bg-purple-900/80 text-white p-8 md:p-10 rounded-3xl shadow-2xl max-w-2xl w-full relative border-4 border-purple-300/30 backdrop-blur-xl mt-12">
            <div className="absolute -top-20 left-1/2 -translate-x-1/2 drop-shadow-xl animate-float">
              <HologramModel emoji="🧙‍♂️" scale={0.7} />
            </div>
            <h2 className="text-3xl text-fuchsia-300 font-black mb-4 text-center mt-6 tracking-widest font-serif border-b border-purple-700/50 pb-4">
              第一章：長老的恐龍圖鑑 (Z分數)
            </h2>
            <p className="text-purple-100 text-lg mb-6 leading-relaxed">
              「咳咳！小妖精聽好了。不同種類的恐龍都有牠們的『平均體重』。要衡量一隻恐龍到底有多巨型，光看重量是不夠的，我們必須計算牠與平均值的距離有幾個『標準差』，這就是 <b>Z 分數 (Z-Score)</b>！」
            </p>
            <div className="bg-purple-950/60 rounded-xl p-6 mb-6 border border-purple-800/50 shadow-inner flex flex-col items-center">
              <div className="text-4xl font-mono text-sky-300 flex items-center justify-center">
                Z = 
                <span className="mx-4 text-center flex flex-col items-center">
                  <span className="border-b-2 border-sky-300 px-2 pb-1 block">X - μ</span>
                  <span className="pt-1 block">σ</span>
                </span>
              </div>
            </div>
            <ul className="text-md space-y-3 text-purple-100 font-bold bg-purple-800/40 p-4 rounded-xl">
              <li>✨ <span className="text-pink-300 text-xl">X</span> : 原始數據 (例如：這隻小雷龍的體重)</li>
              <li>✨ <span className="text-amber-300 text-xl">μ (Mu)</span> : 母體平均數 (所有小雷龍的平均)</li>
              <li>✨ <span className="text-sky-300 text-xl">σ (Sigma)</span> : 標準差 (體重波動的魔法單位)</li>
            </ul>
            <div className="mt-8 flex justify-end">
              <button onClick={() => setStage(2)} className="px-8 py-3 bg-fuchsia-400 text-white font-black rounded-full hover:bg-fuchsia-300 shadow-[0_0_20px_rgba(232,121,249,0.4)] transition-all">
                我明白了，前往觀測站 ➔
              </button>
            </div>
          </div>
        </div>
      );

      const renderStage2 = () => (
        <div className="flex flex-col h-full animate-fadeIn relative z-10">
          <div className="mb-4 bg-white/70 p-4 rounded-2xl shadow-sm border border-white/50 backdrop-blur-md">
            <h2 className="text-2xl text-teal-700 font-black mb-2">第二章：Z分數與恐龍波動 (實作)</h2>
            <p className="text-emerald-800 text-sm">
              試著拖拉滑桿，運用長老剛才教的公式：<b className="font-mono text-teal-600">Z = (X - μ) / σ</b> 來觀察這隻小恐龍模型吧！
            </p>
          </div>
          <div className="flex-1 grid grid-cols-1 md:grid-cols-2 gap-6 items-center">
            <div className="relative bg-white/70 p-6 rounded-3xl border border-white/50 h-64 flex flex-col justify-end overflow-hidden shadow-lg backdrop-blur-md">
              <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
                <path d="M0 250 Q 50 250 150 200 T 250 50 T 350 200 T 500 250 L0 250" fill="rgba(20, 184, 166, 0.15)" stroke="#14b8a6" strokeWidth="4" />
              </svg>
              <div className="relative w-full h-2 bg-emerald-100 rounded-full mb-10">
                <div className="absolute top-0 bottom-0 left-1/2 w-1 bg-teal-500 -translate-x-1/2"></div>
                <div className="absolute bottom-0 -ml-12 w-24 h-24 flex items-end justify-center transition-all z-10"
                     style={{ left: `${getCurveX(zScoreConcept)}%` }}>
                   <HologramModel emoji="🦕" scale={0.4 + parseFloat(zScoreConcept)*0.1} />
                </div>
                {[-3, -2, -1, 0, 1, 2, 3].map(z => (
                  <div key={z} className="absolute top-4 text-xs font-bold text-emerald-600 -translate-x-1/2" style={{ left: `${getCurveX(z)}%` }}>{z}σ</div>
                ))}
              </div>
            </div>
            <div className="space-y-6 bg-white/70 p-6 rounded-3xl border border-white/50 shadow-md backdrop-blur-md">
              <label className="block text-emerald-800 font-bold mb-3">
                小雷龍重量 (μ=50, σ=10): <span className="text-teal-600 text-2xl">{dinoWeight}</span>
              </label>
              <input type="range" min="10" max="90" value={dinoWeight} onChange={(e) => setDinoWeight(e.target.value)} className="w-full accent-teal-500"/>
              <div className="bg-white/60 p-4 rounded-2xl font-mono text-sm border border-emerald-100 text-emerald-800 shadow-inner">
                <div>Z = ({dinoWeight} - 50) / 10</div>
                <div className="text-3xl mt-2 text-teal-600 font-black">Z = {zScoreConcept}</div>
              </div>
            </div>
          </div>
          <div className="mt-4 flex justify-end">
            <button onClick={() => setStage(3)} className="px-6 py-2 bg-teal-500 text-white font-bold rounded-full hover:bg-teal-400 transition-all shadow-md">翻開第三章 ➔</button>
          </div>
        </div>
      );

      const renderStage3 = () => (
        <div className="flex flex-col h-full animate-fadeIn items-center justify-center relative z-10">
          <div className="bg-white/80 p-8 rounded-3xl border-2 border-white/50 shadow-xl max-w-2xl w-full relative backdrop-blur-xl">
            <div className="absolute -top-6 left-1/2 -translate-x-1/2 bg-amber-400 text-white px-6 py-1.5 rounded-full font-bold shadow-md">
              📜 iPAS 遠古卷軸試煉 (Q1)
            </div>
            <h2 className="text-2xl text-emerald-900 font-bold mb-6 text-center leading-relaxed mt-4">
              第三章：「若某小恐龍的 Z分數(Z-Score) = 2，<br/>請問代表下列哪一種意涵？」
            </h2>
            <div className="space-y-3">
              <button onClick={() => handleQuiz(false, 0)} className="w-full p-4 text-left bg-white/60 hover:bg-white border border-emerald-100 rounded-xl font-bold text-emerald-800 transition-colors shadow-sm">(A) 代表該數據點之原始數值為 2</button>
              <button onClick={() => handleQuiz(false, 0)} className="w-full p-4 text-left bg-white/60 hover:bg-white border border-emerald-100 rounded-xl font-bold text-emerald-800 transition-colors shadow-sm">(B) 該數據點比平均值低 2 個標準差</button>
              <button onClick={() => handleQuiz(false, 0)} className="w-full p-4 text-left bg-white/60 hover:bg-white border border-emerald-100 rounded-xl font-bold text-emerald-800 transition-colors shadow-sm">(C) 代表數據必定為異常值</button>
              <button onClick={() => handleQuiz(true, 15)} className="w-full p-4 text-left bg-amber-50 hover:bg-amber-100 border border-amber-200 rounded-xl font-bold text-amber-700 transition-colors shadow-md">
                (D) 該數據點比平均值高 2 個標準差
              </button>
            </div>
            {quizFeedback && <div className="mt-4 text-center font-black text-xl animate-bounce text-teal-600">{quizFeedback}</div>}
          </div>
        </div>
      );

      const renderStage4 = () => (
        <div className="flex flex-col h-full animate-fadeIn items-center justify-center text-center space-y-6 relative z-10">
          <h2 className="text-3xl text-teal-700 font-black font-serif">第四章：恐龍生態法則 (68-95-99.7)</h2>
          <div className="bg-white/80 p-8 rounded-3xl border border-white/50 shadow-xl max-w-3xl backdrop-blur-xl">
            <p className="text-emerald-900 text-lg font-bold mb-6">
              長老：「侏羅紀的生態都遵循著常態分佈！這代表：」
            </p>
            <ul className="text-left space-y-4 text-md text-emerald-800 bg-white/50 p-6 rounded-xl font-bold shadow-inner">
              <li>🌿 <span className="text-emerald-500 text-lg">|Z| ≤ 1 (約 68%)</span>：最常見的普通幼龍。</li>
              <li>🌊 <span className="text-sky-500 text-lg">|Z| ≤ 2 (約 95%)</span>：稍微少見的稀有幼龍。</li>
              <li>🔮 <span className="text-indigo-500 text-lg">|Z| ≤ 3 (約 99.7%)</span>：極度罕見的史詩幼龍。</li>
              <li>👑 <span className="text-amber-500 text-lg">|Z| &gt; 3</span>：幾乎不存在的傳說級巨龍！</li>
            </ul>
          </div>
          <button onClick={() => setStage(5)} className="px-8 py-3 bg-teal-500 text-white font-bold rounded-full hover:bg-teal-400 shadow-lg hover:scale-105 transition-all">
            翻開第五章：實戰演練 ➔
          </button>
        </div>
      );

      const renderStage5 = () => (
        <div className="flex flex-col h-full animate-fadeIn relative z-10">
          <div className="mb-4 bg-white/70 p-4 rounded-2xl shadow-sm border border-white/50 flex justify-between items-center backdrop-blur-md">
            <h2 className="text-2xl text-teal-700 font-black">第五章：侏羅紀鑑定師</h2>
            <div className="text-xl font-black text-amber-500 bg-white px-4 py-2 rounded-xl shadow-sm flex items-center gap-4">
              <span>🏆 {gameScore}</span>
              <span className="text-sm bg-sky-100 text-sky-700 px-2 py-1 rounded">進度: {dinoWins}/3</span>
            </div>
          </div>
          <div className="flex-1 flex flex-col items-center justify-center space-y-6 bg-white/50 rounded-3xl p-6 relative shadow-inner backdrop-blur-sm">
            <div className="text-sm text-sky-800 font-bold bg-white/90 px-4 py-2 rounded-full mb-2 shadow-sm">已知：μ = 50, σ = 10。請心算 Z 分數並判斷恐龍稀有度！</div>
            <div className="absolute top-20 font-bold text-xl text-teal-600 animate-bounce">{dinoFeedback}</div>
            
            <div className="my-6">
              <HologramModel emoji="🦕" scale={0.7 + (targetDino.weight - 50) * 0.01} />
            </div>
            
            <div className="bg-white/90 text-sky-700 px-6 py-2 rounded-full font-black text-3xl shadow-sm border border-white mt-4">
              {targetDino.weight} kg
            </div>

            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 w-full max-w-3xl mt-4">
              <button onClick={() => guessRarity('common')} className="bg-white/80 hover:bg-emerald-50 text-emerald-700 p-4 rounded-2xl font-bold shadow-md hover:-translate-y-1 transition-all border border-emerald-200"><div className="text-2xl">🌿</div> 普通 (|Z|≤1)</button>
              <button onClick={() => guessRarity('rare')} className="bg-white/80 hover:bg-sky-50 text-sky-700 p-4 rounded-2xl font-bold shadow-md hover:-translate-y-1 transition-all border border-sky-200"><div className="text-2xl">🌊</div> 稀有 (|Z|≤2)</button>

      );

      return (
        <div className="min-h-screen relative font-sans p-2 md:p-8 overflow-x-hidden flex items-center justify-center">
          
          {/* Background Layer */}
          <div className="fixed inset-0 watercolor-bg z-0 transition-colors duration-1000 ease-in-out" style={{ backgroundColor: currentTheme.bg }}>
             <div className="absolute w-[50vw] h-[50vw] rounded-full mix-blend-multiply filter blur-[100px] opacity-70 transition-all duration-1000 ease-in-out pointer-events-none" style={{ backgroundColor: currentTheme.b1, top: '-10%', left: '-10%', transform: `translate(${stage%3 * 5}%, ${stage%2 * 10}%)` }}></div>
             <div className="absolute w-[60vw] h-[60vw] rounded-full mix-blend-multiply filter blur-[120px] opacity-70 transition-all duration-1000 ease-in-out pointer-events-none" style={{ backgroundColor: currentTheme.b2, bottom: '-10%', right: '-10%', transform: `translate(-${stage%2 * 5}%, -${stage%3 * 10}%)` }}></div>
             <div className="absolute w-[45vw] h-[45vw] rounded-full mix-blend-multiply filter blur-[100px] opacity-50 transition-all duration-1000 ease-in-out pointer-events-none" style={{ backgroundColor: currentTheme.b3, top: '20%', left: '30%', transform: `translate(${stage%2 === 0 ? 10 : -10}%, ${stage%2 === 0 ? -10 : 10}%)` }}></div>
          </div>
          
          {/* Floating Forest Light Particles */}
          <div className="fixed inset-0 z-0 pointer-events-none overflow-hidden">
            {[...Array(20)].map((_, i) => (
              <div key={i} className="absolute rounded-full bg-white/60 mix-blend-overlay animate-float"
                   style={{
                     width: Math.random() * 20 + 5 + 'px',
                     height: Math.random() * 20 + 5 + 'px',
                     left: Math.random() * 100 + '%',
                     top: Math.random() * 100 + '%',
                     filter: 'blur(2px)',
                     animationDuration: (Math.random() * 8 + 7) + 's',
                     animationDelay: (Math.random() * 5) + 's'
                   }}>
              </div>
            ))}
          </div>

          <div className="w-full max-w-5xl z-10 flex flex-col">
            {/* Dynamic Progress Bar */}
            {stage > 0 && stage < 17 && (
              <div className="mb-4 bg-white/40 rounded-full h-3 overflow-hidden shadow-sm border border-white/50 backdrop-blur-md shrink-0">
                <div className="h-full transition-all duration-700 ease-out relative" style={{ width: `${(stage / 16) * 100}%`, backgroundColor: currentTheme.b2 }}>
                  <div className="absolute inset-0 bg-white/30 w-full h-full animate-[pulse_2s_ease-in-out_infinite]"></div>
                </div>
              </div>
            )}

            {/* Main Content Card with Glassmorphism */}
            <div className="w-full h-[85vh] min-h-[680px] bg-white/40 border border-white/60 rounded-[2.5rem] p-4 md:p-10 shadow-[0_30px_60px_rgba(0,0,0,0.05)] relative overflow-y-auto overflow-x-hidden custom-scrollbar backdrop-blur-xl flex flex-col">
              {stage === 0 && renderStage0()}
              {stage === 1 && renderStage1()}
              {stage === 2 && renderStage2()}
              {stage === 3 && renderStage3()}
              {stage === 4 && renderStage4()}
              {stage === 5 && renderStage5()}
              {stage === 6 && renderStage6()}
              {stage === 7 && renderStage7()}
              {stage === 8 && renderStage8()}
              {stage === 9 && renderStage9()}
              {stage === 10 && renderStage10()}
              {stage === 11 && renderStage11()}
              {stage === 12 && renderStage12()}
              {stage === 13 && renderStage13()}
              {stage === 14 && renderStage14()}
              {stage === 15 && renderStage15()}
              {stage === 16 && renderStage16()}
              {stage === 17 && renderStage17()}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<FantasyDataAdventure />, document.getElementById('root'));
  </script>
</body>
</html>
